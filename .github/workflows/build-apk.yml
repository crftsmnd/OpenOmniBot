name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          cache: true

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get --enforce-lockfile

      - name: Build APK
        run: ./gradlew --no-daemon :app:assembleDevelopDebug

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: OpenOmniBot-English-debug.apk
          path: app/build/outputs/apk/develop/debug/app-develop-debug.apk
          retention-days: 7
